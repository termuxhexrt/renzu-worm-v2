<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORM v2 | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(220, 38, 38, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(220, 38, 38, 0.05) 0%, transparent 60%);
        }

        .login-card {
            background: #12121a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .login-logo .icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #fff;
        }

        .login-logo h1 span {
            color: #dc2626;
        }

        .login-logo p {
            font-size: 0.7rem;
            color: #666;
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0a12;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
        }

        .form-group input::placeholder {
            color: #444;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.3);
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 32px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            <h1>WORM <span>v2</span></h1>
            <p>Shadow Engine</p>
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" autocomplete="username" autofocus
                    required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" autocomplete="current-password"
                    required>
            </div>
            <button type="submit" class="login-btn">Access Terminal</button>
        </form>

        <div class="footer-text">Authorized personnel only • Red Team Operations</div>
    </div>
</body>

</html>
